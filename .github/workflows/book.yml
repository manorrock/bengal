name: books
on:
  push:
    branches:
      - master
jobs:
  math:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        token: ${{ secrets.GIT_PASSWORD }}
    - uses: actions/setup-node@v1
      with:
        node-version: '10.x'
    - name: 'Installing GitBook CLI'
      run: npm install -g gitbook-cli
    - name: 'Generating Bengal Math Book'
      run: |
        cd book/math
        gitbook install
        gitbook build
        mv _book ../../_book
        cd ../..
        git fetch --no-tags --prune --depth=5 origin +refs/heads/*:refs/remotes/origin/*
        git checkout gh-pages
        mkdir -p book/math || true
        rm -rf book/math/*
        mv _book/* book/math
        git config --global user.email "noreply@manorrock.com"
        git config --global user.name "Automated process"
        git add .
        git commit -m "Auto-publishing Bengal Math Book"
        git push
  message:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        token: ${{ secrets.GIT_PASSWORD }}
    - uses: actions/setup-node@v1
      with:
        node-version: '10.x'
    - name: 'Installing GitBook CLI'
      run: npm install -g gitbook-cli
    - name: 'Generating Bengal Message Book'
      run: |
        cd book/message
        gitbook install
        gitbook build
        mv _book ../../_book
        cd ../..
        git fetch --no-tags --prune --depth=5 origin +refs/heads/*:refs/remotes/origin/*
        git checkout gh-pages
        mkdir -p book/message || true
        rm -rf book/message/*
        mv _book/* book/message
        git config --global user.email "noreply@manorrock.com"
        git config --global user.name "Automated process"
        git add .
        git commit -m "Auto-publishing Bengal Message Book"
        git push
